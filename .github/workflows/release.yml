name: Build & Release

# Déclenché quand tu pousses un tag de version (ex: v1.0.1),
# ou manuellement depuis l'onglet Actions.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # nécessaire pour publier la Release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installer les dépendances
        run: npm ci

      - name: Build renderer + publication de la Release Windows
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
